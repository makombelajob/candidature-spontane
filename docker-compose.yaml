services:
  php:
    build:
      context: ./php
    container_name: CandyS_php
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./apache/default.conf:/etc/apache2/sites-enabled/000-default.conf

  database:
    image: mysql:8.0
    container_name: CandyS_db
    environment:
      MYSQL_ROOT_PASSWORD: admin77911
      MYSQL_DATABASE: Candy_Sponta
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin7791
    volumes:
      - ./mysql:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin
    container_name: CandyS_pma
    environment:
      PMA_HOST: database
      PMA_PASSWORD: admin77911
    ports:
      - "8081:80"
    depends_on:
      - database

  sqlite-web:
    image: coleifer/sqlite-web
    container_name: insee_api_sqlite
    command: sqlite_web /data/data.db --host 0.0.0.0
    ports:
      - "8082:8080"
    volumes:
      - ./app/var/data:/data

  mailhog:
    image: mailhog/mailhog
    container_name: CandyS_mail
    ports:
      - "1025:1025"
      - "8025:8025"